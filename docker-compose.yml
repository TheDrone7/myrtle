services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - myrtle_pgdata:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myrtle -d myrtle"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - myrtle
    profiles:
      - "${ENABLE_DB:-true}"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - myrtle_redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - myrtle
    profiles:
      - "${ENABLE_CACHE:-true}"

  backend:
    build:
      context: ./backend
      platforms:
        - linux/amd64
      dockerfile: ${DOCKERFILE:-Dockerfile}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
        required: false
      redis:
        condition: service_healthy
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      GAME_DATA_DIR: ${GAME_DATA_DIR}
      ASSETS_DIR: ${ASSETS_DIR}
      JWT_SECRET: ${JWT_SECRET}
      SERVICE_KEY: ${SERVICE_KEY}
      ASSET_WS_URL: ${ASSET_WS_URL}
      RATE_LIMIT_RPM: ${RATE_LIMIT_RPM:-100}
      DPS_POLL_INTERVAL: ${DPS_POLL_INTERVAL:-1800}
      DPS_AUTO_RESTART: ${DPS_AUTO_RESTART:-true}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      RUST_LOG: ${RUST_LOG:-info}
    volumes:
      - ./backend:/src
      - ./assets/output:/data/output:ro
    ports:
      - "3060:3060"
    networks:
      - myrtle
    profiles:
      - "true"

  frontend:
    build:
      context: ./frontend
      platforms:
        - linux/amd64
      dockerfile: ${DOCKERFILE:-Dockerfile}
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      BACKEND_URL: ${BACKEND_URL}
      INTERNAL_SERVICE_KEY: ${SERVICE_KEY}
    volumes:
      - ./frontend:/src
    ports:
      - "3000:3000"
    networks:
      - myrtle
    profiles:
      - "true"

  dps-tools:
    build:
      context: ./backend
      platforms:
        - linux/amd64
      dockerfile: Dockerfile.dev
    profiles:
      - tools
    volumes:
      - ./backend:/src
      - ./assets/output:/data/output:ro
      - cargo_cache:/usr/local/cargo/registry
      - pip_cache:/root/.cache/pip
    environment:
      GAME_DATA_DIR: ${GAME_DATA_DIR}
      ASSETS_DIR: ${ASSETS_DIR}
      CARGO_TARGET_DIR: /tmp/cargo_target
    command: sh ./scripts/run-dps-tools.sh

  asset-tools:
    build:
      context: ./assets
      platforms:
        - linux/amd64
    profiles:
      - tools
    volumes:
      - ./assets/ArkAssets:/data/ArkAssets
      - ./assets/output:/data/output

volumes:
  myrtle_pgdata:
  myrtle_redisdata:
  cargo_cache:
  pip_cache:

networks:
  myrtle:
    driver: bridge
