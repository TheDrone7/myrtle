[package]
name = "backend"
version = "0.1.0"
edition = "2024"

[dependencies]
hex = "0.4"
hmac = "0.12.1"
jsonwebtoken = "10.3.0"
md-5 = "0.10.6"
reqwest = { version = "0.13", features = ["json"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
sha1 = "0.10.6"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync"] }
urlencoding = "2"
