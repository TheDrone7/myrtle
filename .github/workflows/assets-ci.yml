name: Assets Pipeline CI

on:
  push:
    branches: [main, v3]
    paths:
      - "assets/**"
      - ".github/workflows/assets-ci.yml"
  pull_request:
    branches: [main, v3]
    paths:
      - "assets/**"
      - ".github/workflows/assets-ci.yml"

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: "-D warnings"
  # Rust 1.85.0+ required for edition 2024
  RUST_TOOLCHAIN: stable
  # Opt into Node.js 24 for GitHub Actions (avoids Node.js 20 deprecation warnings)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ──────────────────────────────────────────────────────────────────────────────
  # Formatting check
  # ──────────────────────────────────────────────────────────────────────────────
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check downloader formatting
        working-directory: assets/downloader
        run: cargo fmt --check

      - name: Check unpacker formatting
        working-directory: assets/unpacker
        run: cargo fmt --check

  # ──────────────────────────────────────────────────────────────────────────────
  # Linting
  # ──────────────────────────────────────────────────────────────────────────────
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            assets/downloader -> target
            assets/unpacker -> target
          key: clippy

      - name: Lint downloader
        working-directory: assets/downloader
        run: cargo clippy --all-targets -- -D warnings

      - name: Lint unpacker
        working-directory: assets/unpacker
        run: cargo clippy --all-targets -- -D warnings

  # ──────────────────────────────────────────────────────────────────────────────
  # Downloader: build + test
  # ──────────────────────────────────────────────────────────────────────────────
  test-downloader:
    name: Test Downloader
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: assets/downloader -> target
          key: test-${{ matrix.os }}

      - name: Build
        working-directory: assets/downloader
        run: cargo build --all-targets

      - name: Test
        working-directory: assets/downloader
        run: cargo test --all-targets

      - name: Doc tests
        working-directory: assets/downloader
        run: cargo test --doc

  # ──────────────────────────────────────────────────────────────────────────────
  # Unpacker: build + test
  # ──────────────────────────────────────────────────────────────────────────────
  test-unpacker:
    name: Test Unpacker
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: assets/unpacker -> target
          key: test-${{ matrix.os }}

      - name: Build
        working-directory: assets/unpacker
        run: cargo build --all-targets

      - name: Test
        working-directory: assets/unpacker
        run: cargo test --all-targets
        env:
          RUST_BACKTRACE: 1
          RUST_MIN_STACK: "33554432"  # 32 MB — fb_json_auto.rs recursive FlatBuffer decoding needs deep stack

      - name: Doc tests
        working-directory: assets/unpacker
        run: cargo test --doc

  # ──────────────────────────────────────────────────────────────────────────────
  # Release build
  # ──────────────────────────────────────────────────────────────────────────────
  build-release:
    name: Release Build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            assets/downloader -> target
            assets/unpacker -> target
          key: release-${{ matrix.os }}

      - name: Build downloader (release)
        working-directory: assets/downloader
        run: cargo build --release

      - name: Build unpacker (release)
        working-directory: assets/unpacker
        run: cargo build --release

      - name: Verify binaries exist
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            ext=".exe"
          else
            ext=""
          fi
          test -f "assets/downloader/target/release/downloader${ext}"
          test -f "assets/unpacker/target/release/unpacker${ext}"

      - name: Smoke test — downloader --help
        working-directory: assets/downloader
        run: cargo run --release -- --help

      - name: Smoke test — unpacker --help
        working-directory: assets/unpacker
        run: cargo run --release -- --help

      - name: Upload binaries
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/v3'
        uses: actions/upload-artifact@v5
        with:
          name: binaries-${{ matrix.os }}
          path: |
            assets/downloader/target/release/downloader*
            assets/unpacker/target/release/unpacker*
            !assets/**/target/release/.fingerprint/**
            !assets/**/target/release/build/**
            !assets/**/target/release/deps/**
            !assets/**/target/release/examples/**
            !assets/**/target/release/incremental/**
            !assets/**/target/release/*.d
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────────
  # Run script validation
  # ──────────────────────────────────────────────────────────────────────────────
  run-script:
    name: Run Script
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: assets
        run: npm ci || npm install --ignore-scripts

      - name: Syntax check
        working-directory: assets
        run: node --check run.mjs

      - name: Validate imports resolve
        working-directory: assets
        run: |
          node -e "
            import('./run.mjs').catch(e => {
              // Expected: script calls inquirer/ora which need TTY
              // We just verify the module parses and imports resolve
              if (e.message.includes('not a function') || e.message.includes('readline')) {
                process.exit(0);
              }
              // Import/syntax errors are real failures
              if (e instanceof SyntaxError || e.code === 'ERR_MODULE_NOT_FOUND') {
                console.error(e);
                process.exit(1);
              }
              // Other runtime errors are OK (no TTY, no binaries, etc.)
              process.exit(0);
            });
          "

  # ──────────────────────────────────────────────────────────────────────────────
  # Security audit
  # ──────────────────────────────────────────────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Audit downloader
        working-directory: assets/downloader
        run: cargo audit || echo "::warning::Downloader audit found vulnerabilities"

      - name: Audit unpacker
        working-directory: assets/unpacker
        run: cargo audit || echo "::warning::Unpacker audit found vulnerabilities"

  # ──────────────────────────────────────────────────────────────────────────────
  # Integration
  # ──────────────────────────────────────────────────────────────────────────────
  integration:
    name: Integration
    runs-on: ubuntu-latest
    needs: [test-downloader, test-unpacker, build-release]
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            assets/downloader -> target
            assets/unpacker -> target
          key: integration

      - name: Build release binaries
        run: |
          cd assets/downloader && cargo build --release &
          cd assets/unpacker && cargo build --release &
          wait

      - name: Setup binaries directory
        working-directory: assets
        run: |
          mkdir -p binaries
          cp downloader/target/release/downloader binaries/
          cp unpacker/target/release/unpacker binaries/

      - name: Verify downloader can reach server
        working-directory: assets
        run: |
          ./binaries/downloader --server en check-update || {
            echo "::warning::Could not reach EN server (network may be restricted in CI)"
          }

      - name: Verify unpacker can list a test bundle
        working-directory: assets
        run: |
          ./binaries/unpacker list -i unpacker/tests/assets/ui_skin_groups.ab

      - name: Verify unpacker extract on test bundle
        working-directory: assets
        run: |
          mkdir -p /tmp/ci-extract-output
          ./binaries/unpacker extract \
            -i unpacker/tests/assets/ \
            -o /tmp/ci-extract-output \
            --image --text
          echo "Extracted files:"
          find /tmp/ci-extract-output -type f | head -20
          count=$(find /tmp/ci-extract-output -type f | wc -l)
          echo "Total files extracted: $count"
          if [ "$count" -eq 0 ]; then
            echo "::error::No files extracted — unpacker may be broken"
            exit 1
          fi

  # ──────────────────────────────────────────────────────────────────────────────
  # Final status
  # ──────────────────────────────────────────────────────────────────────────────
  ci-pass:
    name: CI Pass
    if: always()
    needs: [fmt, clippy, test-downloader, test-unpacker, build-release, run-script, audit, integration]
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs
        run: |
          results=(
            "${{ needs.fmt.result }}"
            "${{ needs.clippy.result }}"
            "${{ needs.test-downloader.result }}"
            "${{ needs.test-unpacker.result }}"
            "${{ needs.build-release.result }}"
            "${{ needs.run-script.result }}"
            "${{ needs.audit.result }}"
            "${{ needs.integration.result }}"
          )
          for result in "${results[@]}"; do
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              echo "::error::Job failed with result: $result"
              exit 1
            fi
          done
          echo "All jobs passed!"
